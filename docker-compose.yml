version: '3.8'

services:
  scraper:
    build: .
    container_name: trendyol-scraper
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    shm_size: '1gb'
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"